<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPMS - Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <aside class="w-64 bg-gray-900 text-white flex flex-col">
        <div class="p-4 text-2xl font-bold border-b border-gray-800">POPMS Admin</div>
        <nav class="flex-1 p-4 space-y-2" id="sidebarNav">
            <a href="#" data-target="dashboard" class="block px-4 py-2 bg-gray-800 rounded hover:bg-gray-700 transition">Dashboard</a>
            <a href="#" data-target="customer" class="block px-4 py-2 rounded hover:bg-gray-700 transition">Customer CRM</a>
            <a href="#" data-target="order" class="block px-4 py-2 rounded hover:bg-gray-700 transition">Order Management</a>
            <a href="#" data-target="design" class="block px-4 py-2 rounded hover:bg-gray-700 transition">Design & Files</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="bg-white shadow p-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800" id="headerTitle">Dashboard</h1>
            <div class="text-sm text-gray-500">អ្នកប្រើប្រាស់: Owner</div>
        </header>
        
        <div id="main-content" class="p-6 flex-1 overflow-y-auto">
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-blue-500">
                <h2 class="text-xl font-bold">សូមស្វាគមន៍មកកាន់ POPMS</h2>
                <p class="text-gray-600 mt-2">ប្រព័ន្ធគ្រឹះត្រូវបានដំឡើងជោគជ័យ។ សូមចាប់ផ្តើមសរសេរ Modules។</p>
            </div>
        </div>
    </main>

    <script type="module" src="./app.js"></script>

</html>
